name: Run Reliable Rentals DB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run database and capture results
        run: |
          python src/main.py > query_output.txt

      - name: Inject results into README
        run: |
          python3 - <<'EOF'
          with open("query_output.txt", "r") as f:
              results = f.read()

          with open("README.md", "r") as f:
              readme = f.read()

          block = (
              "<!-- RESULTS_START -->\n"
              "```\n"
              + results +
              "```\n"
              "<!-- RESULTS_END -->"
          )

          import re
          updated = re.sub(
              r"<!-- RESULTS_START -->.*?<!-- RESULTS_END -->",
              block,
              readme,
              flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(updated)
          EOF

      - name: Commit updated README
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Auto: update query results in README"
          git push